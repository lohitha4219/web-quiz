<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Web Dev Quiz</title>
  <link rel="icon" href="./logo.jpg">
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="bg-animated" aria-hidden="true"></div>

  <main class="auth-page">
    <section class="auth-card reveal">
      <div class="auth-brand">
        <div class="auth-logo"><img src="./logo.png" alt=""></div>
        <div>
          <h1 class="auth-title">Welcome back</h1>
          <p class="auth-subtitle muted">Log in to start your Web Dev Quiz.</p>
        </div>
      </div>

      <div id="authBanner" class="auth-banner hidden" role="alert"></div>

      <form id="loginForm" class="auth-form" autocomplete="on">
        <label for="loginEmail" class="auth-label">Email</label>
        <input id="loginEmail" name="email" type="email" required placeholder="enter your mail id" />

        <label for="loginPassword" class="auth-label">Password</label>
        <input id="loginPassword" name="password" type="password" required placeholder="enter your password" minlength="6" />

        <button type="submit" class="btn auth-btn">Login</button>

        <p class="auth-linkrow muted" style="justify-content:space-between;gap:12px;">
          <span>
            New user?
<a class='auth-link' href='./signup.html'>Create an account</a>
          </span>
<a class='auth-link' href='./forgotpassword.html' id='forgotLink' style='color:rgba(234,242,255,0.92); text-decoration:none; font-weight:800;'>Forgot password?</a>
        </p>
      </form>


    </section>
  </main>

  <script src="./auth.js"></script>
  <script>
    const form = document.getElementById('loginForm');

    const banner = document.getElementById('authBanner');




    const showBanner = (msg, type) => {
      banner.classList.remove('hidden');
      banner.textContent = msg;
      banner.classList.toggle('auth-banner-error', type === 'error');
      banner.classList.toggle('auth-banner-success', type === 'success');
    };

    const clearBanner = () => {
      if (!banner) return;
      banner.classList.add('hidden');
      banner.classList.remove('auth-banner-error', 'auth-banner-success');
      banner.textContent = '';
    };



    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearBanner();

      const email = document.getElementById('loginEmail').value;
      const password = document.getElementById('loginPassword').value;

      try {
        await window.__webquizAuth.login({ email, password });
        showBanner('Login successful. Redirecting to quiz…', 'success');
        setTimeout(() => {
          window.location.href = './index.html';
        }, 450);
      } catch (err) {
        showBanner(err?.message || 'Login failed', 'error');
      }
    });



    // reveal observer (matches quiz page behavior)
    const io = new IntersectionObserver((entries) => {
      entries.forEach(en => {
        if (en.isIntersecting) en.target.classList.add('in-view');
      });
    }, { threshold: 0.12 });
    document.querySelectorAll('.reveal').forEach(r => io.observe(r));
  </script>
</body>
</html>
