<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Web Dev Quiz - Forgot password</title>
  <link rel="icon" href="./logo.jpg" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="bg-animated" aria-hidden="true"></div>

  <main class="auth-page">
    <section class="auth-card reveal">
      <div class="auth-brand">
        <div class="auth-logo"><img src="./logo.png" alt=""></div>
        <div>
          <h1 class="auth-title">Reset your password</h1>
          <p class="auth-subtitle muted">Update your password to regain access.</p>
        </div>
      </div>

      <div id="authBanner" class="auth-banner hidden" role="alert"></div>

      <form id="resetForm" class="auth-form" autocomplete="on">
        <label for="resetEmail" class="auth-label">Email</label>
        <input id="resetEmail" name="email" type="email" required placeholder="enter your mail id" />

        <label for="resetNewPassword" class="auth-label">New password</label>
        <input id="resetNewPassword" name="newPassword" type="password" required placeholder="enter your new password" minlength="6" />

        <label for="resetConfirmPassword" class="auth-label">Confirm new password</label>
        <input id="resetConfirmPassword" name="confirmNewPassword" type="password" required placeholder="re-enter your new password" minlength="6" />

        <button type="submit" class="btn auth-btn">Reset password</button>

        <p class="auth-linkrow muted" style="justify-content:center;gap:12px;">
          <span>
            Remembered it?
            <a class='auth-link' href='./login.html'>Back to login</a>
          </span>
        </p>
      </form>
    </section>
  </main>

  <script src="./auth.js"></script>
  <script>
    const form = document.getElementById('resetForm');
    const banner = document.getElementById('authBanner');

    const showBanner = (msg, type) => {
      banner.classList.remove('hidden');
      banner.textContent = msg;
      banner.classList.toggle('auth-banner-error', type === 'error');
      banner.classList.toggle('auth-banner-success', type === 'success');
    };

    const clearBanner = () => {
      if (!banner) return;
      banner.classList.add('hidden');
      banner.classList.remove('auth-banner-error', 'auth-banner-success');
      banner.textContent = '';
    };

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearBanner();

      const email = document.getElementById('resetEmail').value;
      const newPassword = document.getElementById('resetNewPassword').value;
      const confirmNewPassword = document.getElementById('resetConfirmPassword').value;

      if (newPassword !== confirmNewPassword) {
        showBanner('Passwords do not match', 'error');
        return;
      }

      try {
        await window.__webquizAuth.resetPassword({ email, newPassword });
        showBanner('Password updated. Redirecting to login…', 'success');
        setTimeout(() => {
          window.location.href = './login.html';
        }, 450);
      } catch (err) {
        showBanner(err?.message || 'Password reset failed', 'error');
      }
    });

    // reveal observer (matches quiz page behavior)
    const io = new IntersectionObserver((entries) => {
      entries.forEach(en => {
        if (en.isIntersecting) en.target.classList.add('in-view');
      });
    }, { threshold: 0.12 });
    document.querySelectorAll('.reveal').forEach(r => io.observe(r));
  </script>
</body>
</html>
